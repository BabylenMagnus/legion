name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64-baseline
            artifact: legion-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: legion-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun build ./src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - run: |
          mv legion-linux-x64/legion-linux-x64 legion-linux-x64-bin
          mv legion-darwin-arm64/legion-darwin-arm64 legion-darwin-arm64-bin
          mv legion-linux-x64-bin legion-linux-x64
          mv legion-darwin-arm64-bin legion-darwin-arm64
          chmod +x legion-linux-x64 legion-darwin-arm64

      - uses: softprops/action-gh-release@v1
        with:
          files: |
            legion-linux-x64
            legion-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
